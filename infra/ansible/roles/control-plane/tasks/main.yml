---
- name: Check if kubeadm has already been initialized
  ansible.builtin.stat:
    path: /etc/kubernetes/admin.conf
  register: kubeadm_init_check

- name: Write kubeadm init config
  ansible.builtin.copy:
    dest: /tmp/kubeadm-init.yaml
    mode: "0600"
    content: |
      apiVersion: kubeadm.k8s.io/v1beta4
      kind: InitConfiguration
      ---
      apiVersion: kubeadm.k8s.io/v1beta4
      kind: ClusterConfiguration
      networking:
        podSubnet: {{ pod_network_cidr }}
        serviceSubnet: {{ service_cidr }}
      ---
      apiVersion: kubelet.config.k8s.io/v1beta1
      kind: KubeletConfiguration
      cgroupDriver: systemd
      failSwapOn: false
  when: not kubeadm_init_check.stat.exists

- name: Initialize control plane
  ansible.builtin.command: >
    kubeadm init
    --config=/tmp/kubeadm-init.yaml
    --skip-phases=addon/kube-proxy
    --ignore-preflight-errors=SystemVerification,Swap,FileContent--proc-sys-net-bridge-bridge-nf-call-iptables
  when: not kubeadm_init_check.stat.exists
  register: kubeadm_init

- name: Create .kube directory for user
  ansible.builtin.file:
    path: "/home/{{ ansible_user }}/.kube"
    state: directory
    owner: "{{ ansible_user }}"
    group: "{{ ansible_user }}"
    mode: "0755"

- name: Copy admin.conf to user's kubeconfig
  ansible.builtin.copy:
    src: /etc/kubernetes/admin.conf
    dest: "/home/{{ ansible_user }}/.kube/config"
    remote_src: true
    owner: "{{ ansible_user }}"
    group: "{{ ansible_user }}"
    mode: "0600"

- name: Fetch kubeconfig to local machine
  ansible.builtin.fetch:
    src: /etc/kubernetes/admin.conf
    dest: "~/.kube/config"
    flat: true

- name: Generate join command
  ansible.builtin.command: kubeadm token create --print-join-command
  register: join_command
  changed_when: false

- name: Save join command locally
  ansible.builtin.copy:
    content: "{{ join_command.stdout }}"
    dest: "{{ playbook_dir }}/../.join-token"
    mode: "0600"
  delegate_to: localhost
  become: false
