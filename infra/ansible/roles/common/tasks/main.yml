---
- name: Detect virtualization type
  ansible.builtin.setup:
    filter: ansible_virtualization_type

- name: Disable swap (skip in LXC)
  ansible.builtin.command: swapoff -a
  changed_when: true
  failed_when: false
  when: ansible_virtualization_type != "lxc"

- name: Remove swap from fstab (skip in LXC)
  ansible.builtin.lineinfile:
    path: /etc/fstab
    regexp: '\sswap\s'
    state: absent
  when: ansible_virtualization_type != "lxc"

- name: Load required kernel modules (skip in LXC, kernel shared with host)
  ansible.builtin.modprobe:
    name: "{{ item }}"
    state: present
  loop: "{{ kernel_modules }}"
  when: ansible_virtualization_type != "lxc"

- name: Persist kernel modules
  ansible.builtin.copy:
    dest: /etc/modules-load.d/kubernetes.conf
    content: |
      {% for mod in kernel_modules %}
      {{ mod }}
      {% endfor %}
    mode: "0644"

- name: Set sysctl params (skip in LXC, kernel params controlled by host)
  ansible.posix.sysctl:
    name: "{{ item.key }}"
    value: "{{ item.value }}"
    sysctl_file: /etc/sysctl.d/99-kubernetes.conf
    reload: true
  loop: "{{ sysctl_params | dict2items }}"
  when: ansible_virtualization_type != "lxc"

- name: Install required packages
  ansible.builtin.apt:
    name:
      - apt-transport-https
      - ca-certificates
      - curl
      - gnupg
      - software-properties-common
      - open-iscsi
      - nfs-common
    state: present
    update_cache: true

- name: Enable and start iscsid
  ansible.builtin.systemd:
    name: iscsid
    state: started
    enabled: true
  when: ansible_virtualization_type != "lxc"

- name: Add Docker GPG key (for containerd)
  ansible.builtin.apt_key:
    url: "https://download.docker.com/linux/{{ ansible_distribution | lower }}/gpg"
    state: present

- name: Add Docker repository (for containerd)
  ansible.builtin.apt_repository:
    repo: "deb https://download.docker.com/linux/{{ ansible_distribution | lower }} {{ ansible_distribution_release }} stable"
    state: present

- name: Install containerd
  ansible.builtin.apt:
    name: "containerd.io"
    state: present
    update_cache: true

- name: Create containerd config directory
  ansible.builtin.file:
    path: /etc/containerd
    state: directory
    mode: "0755"

- name: Generate default containerd config
  ansible.builtin.shell: containerd config default > /etc/containerd/config.toml
  changed_when: true

- name: Enable SystemdCgroup in containerd
  ansible.builtin.replace:
    path: /etc/containerd/config.toml
    regexp: 'SystemdCgroup = false'
    replace: 'SystemdCgroup = true'

- name: Restart and enable containerd
  ansible.builtin.systemd:
    name: containerd
    state: restarted
    enabled: true
    daemon_reload: true

# LXC-specific: kubelet needs /dev/kmsg
- name: Check if running in LXC
  ansible.builtin.stat:
    path: /dev/kmsg
  register: dev_kmsg

- name: Create /dev/kmsg symlink for LXC
  ansible.builtin.file:
    src: /dev/console
    dest: /dev/kmsg
    state: link
  when: not dev_kmsg.stat.exists

- name: Persist /dev/kmsg symlink via rc.local
  ansible.builtin.copy:
    dest: /etc/rc.local
    content: |
      #!/bin/bash
      if [ ! -e /dev/kmsg ]; then
        ln -s /dev/console /dev/kmsg
      fi
      exit 0
    mode: "0755"
  when: not dev_kmsg.stat.exists

- name: Mask console getty services (no console login prompt)
  ansible.builtin.systemd:
    name: "{{ item }}"
    masked: true
  loop:
    - console-getty.service
    - getty@tty1.service
  failed_when: false

# VM-only: prevent DHCPv6/RA from injecting bad search domains (e.g. 'xyz')
- name: Create systemd-networkd drop-in dir for eth0
  ansible.builtin.file:
    path: /etc/systemd/network/10-netplan-eth0.network.d
    state: directory
    mode: "0755"
  when: ansible_virtualization_type != "lxc"

- name: Disable DHCPv6/RA search domain inheritance
  ansible.builtin.copy:
    dest: /etc/systemd/network/10-netplan-eth0.network.d/no-domains.conf
    content: |
      [DHCPv6]
      UseDomains=no

      [IPv6AcceptRA]
      UseDomains=no
    mode: "0644"
  when: ansible_virtualization_type != "lxc"
  register: networkd_dropin

- name: Reload networkd if drop-in changed
  ansible.builtin.command: networkctl reload
  when: networkd_dropin.changed
  changed_when: true

# LXC: kubelet must not fail on swap (host swap visible in container)
- name: Create kubelet systemd drop-in dir
  ansible.builtin.file:
    path: /etc/systemd/system/kubelet.service.d
    state: directory
    mode: "0755"
  when: ansible_virtualization_type == "lxc"

- name: Configure kubelet to ignore swap in LXC
  ansible.builtin.copy:
    dest: /etc/systemd/system/kubelet.service.d/20-fail-swap-off.conf
    content: |
      [Service]
      Environment="KUBELET_EXTRA_ARGS=--fail-swap-on=false"
    mode: "0644"
  when: ansible_virtualization_type == "lxc"

- name: Reload systemd after kubelet drop-in
  ansible.builtin.systemd:
    daemon_reload: true
  when: ansible_virtualization_type == "lxc"
