authentik:
  authentik:
    secret_key: changeme_asdf1234

    postgresql:
      host: authentik-pg-rw
      user: authentik
      password: file:///postgres-creds/password
  server:
    ingress:
      # Disabled — using Cilium Gateway API HTTPRoute (templates/httproute.yaml)
      enabled: false
      ingressClassName: traefik
      hosts:
        - authentik.k8s.shimmerlabs.xyz
    podAnnotations:
      reloader.stakater.com/auto: "true"
    envFrom:
      - secretRef:
          name: paperless-oidc-for-authentik
          optional: true
    volumes:
      - name: postgres-creds
        secret:
          secretName: authentik-db-auth
      - name: paperless-blueprint
        configMap:
          name: paperless-blueprint
          optional: true
    volumeMounts:
      - name: postgres-creds
        mountPath: /postgres-creds
        readOnly: true
      - name: paperless-blueprint
        mountPath: /blueprints/paperless
        readOnly: true

    metrics:
      serviceMonitor:
        enabled: true
        namespace: prometheus

  worker:
    podAnnotations:
      reloader.stakater.com/auto: "true"
    envFrom:
      - secretRef:
          name: paperless-oidc-for-authentik
          optional: true
    volumes:
      - name: postgres-creds
        secret:
          secretName: authentik-db-auth
      - name: paperless-blueprint
        configMap:
          name: paperless-blueprint
          optional: true
    volumeMounts:
      - name: postgres-creds
        mountPath: /postgres-creds
        readOnly: true
      - name: paperless-blueprint
        mountPath: /blueprints/paperless
        readOnly: true
    metrics:
      serviceMonitor:
        enabled: true
        namespace: prometheus
 
dbPassword:
  generate: true
  length: 32
  symbols: 0
  secretName: authentik-db-auth