authentik:
  authentik:
    secret_key: changeme_asdf1234

    postgresql:
      host: authentik-pg-rw
      user: authentik
      password: file:///postgres-creds/password
  server:
    ingress:
      # Disabled — using Cilium Gateway API HTTPRoute (templates/httproute.yaml)
      enabled: false
      ingressClassName: traefik
      hosts:
        - authentik.k8s.shimmerlabs.xyz
    podAnnotations:
      reloader.stakater.com/auto: "true"
    volumes:
      - name: postgres-creds
        secret:
          secretName: authentik-db-auth
    volumeMounts:
      - name: postgres-creds
        mountPath: /postgres-creds
        readOnly: true

    metrics:
      serviceMonitor:
        enabled: true
        namespace: prometheus
      
  worker:
    podAnnotations:
      reloader.stakater.com/auto: "true"
    volumes:
      - name: postgres-creds
        secret:
          secretName: authentik-db-auth
    volumeMounts:
      - name: postgres-creds
        mountPath: /postgres-creds
        readOnly: true
    metrics:
      serviceMonitor:
        enabled: true
        namespace: prometheus
 
dbPassword:
  generate: true
  length: 32
  symbols: 0
  secretName: authentik-db-auth