grafana:
  replicas: 1

  adminUser: admin
  adminPassword: changeme

  service:
    type: ClusterIP
    port: 80

  persistence:
    enabled: true
    type: sts
    storageClassName: truenas-iscsi
    accessModes:
      - ReadWriteOnce
    size: 10Gi
    finalizers:
      - kubernetes.io/pvc-protection

  ingress:
    # Disabled — using Cilium Gateway API HTTPRoute (templates/httproute.yaml)
    enabled: false
    ingressClassName: traefik
    hosts:
      - grafana.k8s.shimmerlabs.xyz
  serviceMonitor:
    # Disabled until kube-prometheus-stack provides ServiceMonitor CRD.
    # Re-enable after monitoring stack syncs.
    enabled: false
    namespace: prometheus
    labels:
      release: kube-prometheus-stack
    interval: 30s
    scrapeTimeout: 30s
    path: /metrics

  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 1Gi

  # Prometheus datasource — provisioned via GitOps so it survives pod/PVC loss.
  datasources:
    datasources.yaml:
      apiVersion: 1
      datasources:
        - name: Prometheus
          uid: prometheus
          type: prometheus
          access: proxy
          url: http://kube-prometheus-stack-prometheus.monitoring.svc:9090
          isDefault: true

  # Sidecar auto-discovers dashboard ConfigMaps labeled grafana_dashboard=1
  # (e.g. from the homelab-dashboards chart) in the grafana namespace.
  sidecar:
    dashboards:
      enabled: true
      label: grafana_dashboard
      labelValue: "1"
      folderAnnotation: grafana_folder
      provider:
        foldersFromFilesStructure: true
      searchNamespace: grafana

  dashboardProviders:
    dashboardproviders.yaml:
      apiVersion: 1
      providers:
      - name: 'grafana-dashboards-kubernetes'
        orgId: 1
        folder: 'Kubernetes'
        type: file
        disableDeletion: true
        editable: true
        options:
          path: /var/lib/grafana/dashboards/grafana-dashboards-kubernetes
  dashboards:
    grafana-dashboards-kubernetes:
      k8s-system-api-server:
        url: https://raw.githubusercontent.com/dotdc/grafana-dashboards-kubernetes/master/dashboards/k8s-system-api-server.json
        token: ''
      k8s-system-coredns:
        url: https://raw.githubusercontent.com/dotdc/grafana-dashboards-kubernetes/master/dashboards/k8s-system-coredns.json
        token: ''
      k8s-views-global:
        url: https://raw.githubusercontent.com/dotdc/grafana-dashboards-kubernetes/master/dashboards/k8s-views-global.json
        token: ''
      k8s-views-namespaces:
        url: https://raw.githubusercontent.com/dotdc/grafana-dashboards-kubernetes/master/dashboards/k8s-views-namespaces.json
        token: ''
      k8s-views-nodes:
        url: https://raw.githubusercontent.com/dotdc/grafana-dashboards-kubernetes/master/dashboards/k8s-views-nodes.json
        token: ''
      k8s-views-pods:
        url: https://raw.githubusercontent.com/dotdc/grafana-dashboards-kubernetes/master/dashboards/k8s-views-pods.json
        token: ''