cilium:
  # Direct API server endpoint — kube-proxy is replaced by Cilium so cluster IP doesn't work for bootstrap
  k8sServiceHost: 10.22.6.100
  k8sServicePort: 6443
  clustermesh.apiserver.metrics.serviceMonitor.enabled: true
  envoy:
    enabled: true
    prometheus.serviceMonitor.enabled: true

  envoyConfig:
    enabled: true

  ingressController:
    # Disabled — Traefik handles ingress. Cilium ingress would compete for LoadBalancer IPs.
    enabled: false
    default: false

  gatewayAPI:
    enabled: true

  hubble:
    metrics:
      serviceMonitor:
        enabled: true
    enabled: true
    relay:
      enabled: true
      prometheus:
        serviceMonitor.enabled: true
    ui:
      enabled: true

  operator.prometheus.serviceMonitor.enabled: true

  prometheus:
    serviceMonitor:
      enabled: true
      trustCRDsExist: true

  nodePort:
    enabled: true
    enableHealthCheck: true

  kubeProxyReplacement: "true"

  # L2 announcements (replaces MetalLB)
  l2announcements:
    enabled: true
  # Higher k8s API request burst for L2 announcement leader election
  k8sClientRateLimit:
    qps: 50
    burst: 100
 
hubbleIngress:
  enabled: true
  host: hubble.k8s.shimmerlabs.xyz
  ingressClassName: traefik
  entrypoints: websecure
  clusterIssuer: letsencrypt-prod
  tlsSecretName: hubble-ui-tls
  namespace: kube-system
  annotations: {}