# GitHub repository URL
repoURL: https://github.com/mralanlee/homelab.git
targetRevision: main

# Sync waves order:
# -10: foundational CRDs (kube-prometheus-stack provides ServiceMonitor)
#   0: default (most apps)
#  10: app-layer that depends on foundational stuff being healthy
apps:
  # Wave -20: prometheus-operator CRDs (must exist before kube-prometheus-stack and any chart using ServiceMonitor)
  - name: prometheus-operator-crds
    namespace: monitoring
    path: charts/prometheus-operator-crds
    syncWave: -20
    serverSideApply: true

  # Wave -10: install first — provides ServiceMonitor CRD that other charts use
  - name: kube-prometheus-stack
    namespace: monitoring
    path: charts/kube-prometheus-stack
    syncWave: -10

  - name: cn-pg
    namespace: cnpg-system
    path: charts/cn-pg
    syncWave: -10

  # Wave 0: core infrastructure
  - name: cilium
    namespace: kube-system
    path: charts/cilium

  - name: gateway
    namespace: gateway
    path: charts/gateway

  - name: cert-manager
    namespace: cert-manager
    path: charts/cert-manager

  - name: external-secrets
    namespace: external-secrets
    path: charts/external-secrets

  - name: democratic-csi
    namespace: democratic-csi
    path: charts/democratic-csi

  - name: metrics-server
    namespace: kube-system
    path: charts/metrics-server

  - name: grafana
    namespace: grafana
    path: charts/grafana

  # Wave 10: depends on cn-pg + cert-manager + external-secrets
  - name: authentik
    namespace: authentik
    path: charts/authentik
    syncWave: 10
    # cn-pg operator mutates Cluster CR fields. Ignore those to avoid drift.
    ignoreDifferences:
      - group: postgresql.cnpg.io
        kind: Cluster
        jsonPointers:
          - /spec/bootstrap
          - /spec/storage
        managedFieldsManagers:
          - cnpg-controller-manager
