ipAddressPools:
  - name: homelab-services
    addresses:
      - 10.22.6.10-10.22.6.254
      - 10.22.7.1-10.22.7.254
      - 10.22.8.1-10.22.8.254
    autoAssign: true

l2Advertisements:
  - name: homelab-services
    ipAddressPools:
      - homelab-services

metallb:
  controller:
    # Webhook disabled — API server in LXC can't reach pod network ClusterIPs reliably
    webhookMode: disabled
    logLevel: info
  speaker:
    logLevel: info
  prometheus:
    serviceAccount: metallb-prometheus
    namespace: metallb-system
    serviceMonitor:
      # Disabled until kube-prometheus-stack is installed (provides ServiceMonitor CRD).
      # Re-enable via ArgoCD after monitoring stack syncs.
      enabled: false
      interval: 30
      speaker:
        additionalLabels:
          release: kube-prometheus-stack
      controller:
        additionalLabels:
          release: kube-prometheus-stack

