argo-cd:
  fullnameOverride: argocd
  global:
    domain: argocd.k8s.shimmerlabs.xyz
    logging:
      level: info
    securityContext:
      runAsNonRoot: true

  configs:
    cm:
      url: https://argocd.k8s.shimmerlabs.xyz
      dex.config: |
        issuer: https://argocd.k8s.shimmerlabs.xyz/api/dex
        connectors:
        - type: oidc
          id: authentik
          name: authentik
          config:
            issuer: https://authentik.k8s.shimmerlabs.xyz/application/o/argo-cd/  # update slug if different
            clientID: $dex.authentik.clientID
            clientSecret: $dex.authentik.clientSecret
            insecureEnableGroups: true
            scopes:
              - openid
              - profile
              - email
              - groups
    params:
      server.insecure: true
      # Dex serves HTTPS on 5556 (self-signed); keep TLS offload at ingress for users.
      dex.server: https://argocd-dex-server:5556
      server.dex.server: https://argocd-dex-server:5556
      server.dex.server.strict.tls: "false"
    rbac:
      policy.csv: |
        g, ArgoCD Admins, role:admin
        g, ArgoCD Viewers, role:readonly

  controller:
    replicas: 1
    metrics:
      enabled: true
      service:
        labels:
          release: kube-prometheus-stack
      serviceMonitor:
        # Disabled until kube-prometheus-stack provides ServiceMonitor CRD + monitoring ns.
        enabled: false
        namespace: monitoring
        additionalLabels:
          release: kube-prometheus-stack

  repoServer:
    autoscaling:
      enabled: false
    metrics:
      enabled: true
      service:
        labels:
          release: kube-prometheus-stack
      serviceMonitor:
        # Disabled until kube-prometheus-stack provides ServiceMonitor CRD + monitoring ns.
        enabled: false
        namespace: monitoring
        additionalLabels:
          release: kube-prometheus-stack

  server:
    certificate:
      enabled: true
      domain: argocd.k8s.shimmerlabs.xyz
      issuer:
        kind: ClusterIssuer
        name: letsencrypt-prod
    service:
      type: ClusterIP
    ingress:
      enabled: true
      ingressClassName: traefik
      tls: true
      hostname: argocd.k8s.shimmerlabs.xyz
      annotations:
        traefik.ingress.kubernetes.io/router.entrypoints: websecure
      paths:
        - /
    extraArgs:
      - --insecure
    metrics:
      enabled: true
      service:
        labels:
          release: kube-prometheus-stack
      serviceMonitor:
        # Disabled until kube-prometheus-stack provides ServiceMonitor CRD + monitoring ns.
        enabled: false
        namespace: monitoring
        additionalLabels:
          release: kube-prometheus-stack

  redis:
    enabled: true

  dex:
    enabled: true
    # Map external authentik URL to internal cluster service so OIDC discovery
    # bypasses Cilium hairpin/LoadBalancer. Issuer URL stays external (for JWT iss claim).
    hostAliases:
      - ip: 10.111.249.141
        hostnames:
          - authentik.k8s.shimmerlabs.xyz

