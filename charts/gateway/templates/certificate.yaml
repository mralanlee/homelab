---
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: {{ .Values.gateway.tlsSecretName }}
  namespace: {{ .Values.gateway.namespace }}
spec:
  secretName: {{ .Values.gateway.tlsSecretName }}
  issuerRef:
    kind: ClusterIssuer
    name: {{ .Values.gateway.clusterIssuer }}
  dnsNames:
    - "{{ .Values.gateway.hostname }}"
