kube-prometheus-stack:
  # CRDs installed via separate prometheus-operator-crds chart (avoids ArgoCD annotation size limit)
  crds:
    enabled: false
  grafana:
    enabled: false

  prometheus:
    prometheusSpec:
      retention: 15d
      storageSpec:
        volumeClaimTemplate:
          metadata:
            labels:
              app: prometheus
          spec:
            storageClassName: truenas-iscsi
            accessModes:
              - ReadWriteOnce
            resources:
              requests:
                storage: 50Gi
    ingress:
      # Disabled — using Cilium Gateway API HTTPRoute (templates/httproute.yaml)
      enabled: false
      ingressClassName: traefik
      hosts:
        - prometheus.k8s.shimmerlabs.xyz
      paths:
        - /
      pathType: Prefix
      tls:
        - secretName: wildcard-k8s-shimmerlabs
          hosts:
            - prometheus.k8s.shimmerlabs.xyz
            
  alertmanager:
    alertmanagerSpec:
      storage:
        volumeClaimTemplate:
          metadata:
            labels:
              app: alertmanager
          spec:
            storageClassName: truenas-iscsi
            accessModes:
              - ReadWriteOnce
            resources:
              requests:
                storage: 10Gi
    ingress:
      # Disabled — using Cilium Gateway API HTTPRoute (templates/httproute.yaml)
      enabled: false
      ingressClassName: traefik
      hosts:
        - alertmanager.k8s.shimmerlabs.xyz
      paths:
        - /
      pathType: Prefix
      tls:
        - secretName: wildcard-k8s-shimmerlabs
          hosts:
            - alertmanager.k8s.shimmerlabs.xyz