k8s-gateway:
  domain: k8s.shimmerlabs.xyz
  ttl: 60
  service:
    type: LoadBalancer
    annotations:
      io.cilium/lb-ipam-ips: "10.22.6.53"
  # Skip GRPCRoute (k8s-gateway 0.4.0 uses v1alpha2 API; CRDs only have v1)
  watchedResources:
    - HTTPRoute
    - Gateway
    - Ingress
  fallthrough:
    enabled: false
