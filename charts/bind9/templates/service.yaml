---
apiVersion: v1
kind: Service
metadata:
  name: bind9
  annotations:
    io.cilium/lb-ipam-ips: {{ .Values.bind9.loadBalancerIP | quote }}
spec:
  type: LoadBalancer
  externalTrafficPolicy: Cluster
  selector:
    app: bind9
  ports:
    - name: dns-udp
      port: 53
      protocol: UDP
      targetPort: dns-udp
    - name: dns-tcp
      port: 53
      protocol: TCP
      targetPort: dns-tcp
