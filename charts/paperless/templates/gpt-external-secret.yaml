{{- if .Values.gpt.enabled }}
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: {{ .Release.Name }}-gpt
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "paperless.labels" . | nindent 4 }}
spec:
  secretStoreRef:
    kind: ClusterSecretStore
    name: {{ .Values.externalSecrets.store | default "onepassword-sdk" }}
  target:
    name: {{ .Release.Name }}-gpt
    creationPolicy: Owner
    template:
      data:
        OPENAI_API_KEY: "{{ `{{ .openai_api_key }}` }}"
        PAPERLESS_API_TOKEN: "{{ `{{ .paperless_api_token }}` }}"
  data:
    - secretKey: openai_api_key
      remoteRef:
        key: paperless-openai-api-key/credential
    - secretKey: paperless_api_token
      remoteRef:
        key: paperless-api-token/credential
{{- end }}
